log:
  level: INFO

accessLog: {}

api:
  dashboard: true
  insecure: true # Dashboard reachable on :8081 — dev only

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: false
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: renis_default
  file:
    directory: /etc/traefik/dynamic
    watch: true
