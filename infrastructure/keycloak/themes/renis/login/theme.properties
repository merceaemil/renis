parent=keycloak.v2
import=common/keycloak

# Append a custom stylesheet on top of the parent's CSS (PatternFly 5).
# Order matters: parent file first, our overrides last so they win.
styles=css/styles.css css/renis-login.css

# Tiny upgrade script: turns the native <select id="login-select-toggle"> that
# Keycloak emits for the locale switcher into a segmented anchor-button group
# (same UX as <LanguageSwitcher variant="inline"/> in the management app).
scripts=js/renis-locale.js

# Internationalization: declares locales the theme advertises to Keycloak.
# Must match realm "supportedLocales". Localized strings live in
# messages/messages_<lang>.properties (e.g. messages_fr.properties).
locales=en,fr
