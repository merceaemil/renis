services:
  traefik:
    image: traefik:v3.7
    restart: unless-stopped
    # All static configuration is passed as CLI flags. We intentionally do NOT
    # use --configFile: Traefik v3 ignores CLI flags / env vars for sections
    # already present in a static config file, so resolvers added on the
    # command line are silently dropped and routers fail with
    # "nonexistent certificate resolver letsencrypt". The dynamic file
    # provider below still loads infrastructure/traefik/dynamic/*.yml.
    command:
      - --log.level=INFO
      - --accesslog=true
      - --api.dashboard=true
      - --api.insecure=true # dashboard on :8081 — dev only
      # Entrypoints (HTTP redirects to HTTPS; ACME HTTP-01 still works because
      # Traefik handles /.well-known/acme-challenge/* before applying redirects)
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=false
      - --entrypoints.websecure.address=:443
      # Providers
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=renis_default
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      # Let's Encrypt ACME resolver (HTTP-01 challenge on the `web` entrypoint)
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:-admin@renis.arxia.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      # Production CA by default. Set LETSENCRYPT_CA_SERVER to
      # https://acme-staging-v02.api.letsencrypt.org/directory while testing
      # to avoid the strict prod rate limits.
      - --certificatesresolvers.letsencrypt.acme.caserver=${LETSENCRYPT_CA_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080" # Traefik dashboard (dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./infrastructure/traefik/certs:/etc/traefik/certs:ro
      - traefik_acme:/acme

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-renis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-renis_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-renis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-databases.sh:/docker-entrypoint-initdb.d/02-init-databases.sh:ro
    ports:
      - "5532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-renis}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev_password}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_BASE_URL:-https://auth.renis.arxia.com}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infrastructure/keycloak/realm-renis.json:/opt/keycloak/data/import/realm-renis.json:ro
      - ./infrastructure/keycloak/themes/renis:/opt/keycloak/themes/renis:ro
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    labels:
      traefik.enable: "true"
      traefik.http.routers.keycloak.rule: "Host(`auth.renis.arxia.com`)"
      traefik.http.routers.keycloak.entrypoints: "websecure"
      traefik.http.routers.keycloak.tls: "true"
      traefik.http.routers.keycloak.tls.certresolver: "letsencrypt"
      traefik.http.services.keycloak.loadbalancer.server.port: "8080"

  # Keycloak realm import omits the openid client scope; TYPO3 userinfo needs it (KC #16168).
  keycloak-config:
    image: quay.io/keycloak/keycloak:26.2
    restart: "no"
    depends_on:
      keycloak:
        condition: service_started
    environment:
      KEYCLOAK_SERVER: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: renis
    volumes:
      - ./infrastructure/keycloak/configure-realm-scopes.sh:/configure-realm-scopes.sh:ro
    entrypoint: ["/bin/bash", "/configure-realm-scopes.sh"]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-https://data.renis.arxia.com}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9002:9001"
    labels:
      traefik.enable: "true"
      traefik.http.routers.minio.rule: "Host(`data.renis.arxia.com`)"
      traefik.http.routers.minio.entrypoints: "websecure"
      traefik.http.routers.minio.tls: "true"
      traefik.http.routers.minio.tls.certresolver: "letsencrypt"
      traefik.http.services.minio.loadbalancer.server.port: "9000"

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/${MINIO_BUCKET:-renis-documents} || true;
      mc mb -p local/renis-backups || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-renis-documents}

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  typo3:
    build:
      context: .
      dockerfile: services/typo3/Dockerfile
    restart: unless-stopped
    environment:
      TYPO3_CONTEXT: Development/Docker
      TYPO3_DB_HOST: postgres
      TYPO3_DB_PORT: "5432"
      TYPO3_DB_NAME: ${TYPO3_DB_NAME:-typo3}
      TYPO3_DB_USER: ${TYPO3_DB_USER:-typo3}
      TYPO3_DB_PASSWORD: ${TYPO3_DB_PASSWORD:-typo3_dev_password}
      TYPO3_BASE_URL: ${TYPO3_BASE_URL:-https://renis.arxia.com}
      PHP_DISPLAY_ERRORS: "1"
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://auth.renis.arxia.com/realms/renis}
      KEYCLOAK_INTERNAL_ISSUER: ${KEYCLOAK_INTERNAL_ISSUER:-http://keycloak:8080/realms/renis}
      KEYCLOAK_TYPO3_CLIENT_ID: ${KEYCLOAK_TYPO3_CLIENT_ID:-renis-typo3}
      KEYCLOAK_TYPO3_CLIENT_SECRET: ${KEYCLOAK_TYPO3_CLIENT_SECRET:-change-me-typo3-secret}
      WIDGET_PUBLIC_URL: ${WIDGET_PUBLIC_URL:-https://widget.renis.arxia.com}
      MANAGEMENT_PUBLIC_URL: ${MANAGEMENT_PUBLIC_URL:-https://management.renis.arxia.com}
      RENIS_DATABASE_URL: postgresql://${POSTGRES_USER:-renis}:${POSTGRES_PASSWORD:-renis_dev_password}@postgres:5432/${POSTGRES_DB:-renis}
    volumes:
      - ./services/typo3:/var/www/html
      - ./infrastructure/typo3/renis_verify:/opt/renis_verify:ro
      - ./infrastructure/typo3/docker-entrypoint.sh:/usr/local/bin/renis-typo3-entrypoint.sh:ro
      - ./infrastructure/typo3/container-finish-setup.sh:/usr/local/bin/renis-typo3-finish-setup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      keycloak-config:
        condition: service_completed_successfully
    labels:
      traefik.enable: "true"
      traefik.http.routers.typo3.rule: "Host(`renis.arxia.com`)"
      traefik.http.routers.typo3.entrypoints: "websecure"
      traefik.http.routers.typo3.tls: "true"
      traefik.http.routers.typo3.tls.certresolver: "letsencrypt"
      traefik.http.services.typo3.loadbalancer.server.port: "80"

  management:
    build:
      context: .
      dockerfile: services/management/Dockerfile
      args:
        NEXT_PUBLIC_KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://auth.renis.arxia.com/realms/renis}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-renis-management}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-renis}:${POSTGRES_PASSWORD:-renis_dev_password}@postgres:5432/${POSTGRES_DB:-renis}
      AUTH_URL: ${AUTH_URL:-https://management.renis.arxia.com}
      AUTH_SECRET: ${AUTH_SECRET:-dev-renis-auth-secret-do-not-use-in-production}
      AUTH_TRUST_HOST: "true"
      MANAGEMENT_PUBLIC_URL: ${MANAGEMENT_PUBLIC_URL:-https://management.renis.arxia.com}
      NEXT_PUBLIC_KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://auth.renis.arxia.com/realms/renis}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-renis-management}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://renis.arxia.com}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-https://auth.renis.arxia.com/realms/renis}
      KEYCLOAK_INTERNAL_ISSUER: ${KEYCLOAK_INTERNAL_ISSUER:-http://keycloak:8080/realms/renis}
      KEYCLOAK_ADMIN_URL: ${KEYCLOAK_ADMIN_URL:-https://auth.renis.arxia.com}
      KEYCLOAK_ADMIN_INTERNAL_URL: ${KEYCLOAK_ADMIN_INTERNAL_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-renis}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-renis-management}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me-in-production}
      AUTH_KEYCLOAK_ID: ${KEYCLOAK_CLIENT_ID:-renis-management}
      AUTH_KEYCLOAK_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me-in-production}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@renis.bi}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-https://data.renis.arxia.com}
      MINIO_BUCKET: ${MINIO_BUCKET:-renis-documents}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      PUPPETEER_EXECUTABLE_PATH: ${PUPPETEER_EXECUTABLE_PATH:-/usr/bin/chromium-browser}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      keycloak-config:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    labels:
      traefik.enable: "true"
      # `/api/*` and the UI live on the same Next.js app; one host rule is enough.
      traefik.http.routers.management.rule: "Host(`management.renis.arxia.com`)"
      traefik.http.routers.management.entrypoints: "websecure"
      traefik.http.routers.management.tls: "true"
      traefik.http.routers.management.tls.certresolver: "letsencrypt"
      traefik.http.services.management.loadbalancer.server.port: "3000"

  widget:
    build:
      context: .
      dockerfile: services/widget/Dockerfile
    restart: unless-stopped
    environment:
      RENIS_API_URL: ${MANAGEMENT_PUBLIC_URL:-https://management.renis.arxia.com}
    labels:
      traefik.enable: "true"
      traefik.http.routers.widget.rule: "Host(`widget.renis.arxia.com`)"
      traefik.http.routers.widget.entrypoints: "websecure"
      traefik.http.routers.widget.tls: "true"
      traefik.http.routers.widget.tls.certresolver: "letsencrypt"
      traefik.http.services.widget.loadbalancer.server.port: "80"

  db-migrate:
    build:
      context: .
      dockerfile: packages/database/Dockerfile
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-renis}:${POSTGRES_PASSWORD:-renis_dev_password}@postgres:5432/${POSTGRES_DB:-renis}
    depends_on:
      postgres:
        condition: service_healthy

  db-seed:
    build:
      context: .
      dockerfile: packages/database/Dockerfile
    profiles: ["tools"]
    command: ["npm", "run", "seed"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-renis}:${POSTGRES_PASSWORD:-renis_dev_password}@postgres:5432/${POSTGRES_DB:-renis}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  traefik_acme:
